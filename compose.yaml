services:
  postgres:
    image: postgres:18-alpine
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 2s
      timeout: 3s
      retries: 10
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: repo_stat
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: api:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.api
    container_name: api
    restart: unless-stopped
    ports:
      - 28080:8080
    volumes:
      - ./repo-stat/api/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - SUBSCRIBER_ADDRESS=subscriber:8080
      - PROCESSOR_ADDRESS=processor:8080
    depends_on:
      subscriber:
        condition: service_healthy
      processor:
        condition: service_healthy
      postgres:
        condition: service_healthy
  subscriber:
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      interval: 2s
      timeout: 3s
      retries: 10
    image: subscriber:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.subscriber
    container_name: subscriber
    restart: unless-stopped
    ports:
      - 28081:8080
    volumes:
      - ./repo-stat/subscriber/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - DATABASE_DSN=postgres://postgres:postgres@postgres:5432/repo_stat?sslmode=disable
      - MIGRATIONS_PATH=file:///migrations
    depends_on:
      postgres:
        condition: service_healthy

  processor:
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      interval: 2s
      timeout: 3s
      retries: 10
    image: processor:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.processor
    container_name: processor
    restart: unless-stopped
    ports:
      - 28082:8080
    volumes:
      - ./repo-stat/processor/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - COLLECTOR_ADDRESS=collector:8080
    depends_on:
      collector:
        condition: service_healthy


  collector:
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      interval: 2s
      timeout: 3s
      retries: 10
    image: collector:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.collector
    container_name: collector
    restart: unless-stopped
    ports:
      - 28083:8080
    volumes:
      - ./repo-stat/collector/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - SUBSCRIBER_ADDRESS=subscriber:8080

  tests:
    image: tests:latest
    build:
      context: tests
    container_name: tests
    restart: "no"
    depends_on:
      - api
    entrypoint: [ "true" ]

volumes:
  postgres_data:
