name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: repo-stat/go.mod
          cache: true
          cache-dependency-path: repo-stat/go.sum

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install tools
        run: make -C repo-stat tools

      - name: Check protobuf generation
        run: |
          make proto
          git diff --exit-code

      - name: Lint
        run: make lint

      - name: Unit
        run: make unit

  integration:
    runs-on: ubuntu-latest
    needs: lint-and-unit
    steps:
      - uses: actions/checkout@v5

      - name: Integration tests
        run: |
          set +e
          make test
          status=$?
          docker compose ps
          docker compose logs postgres
          docker inspect postgres --format='{{json .State.Health}}'
          exit $status
        env:
          CONTAINER_RUNTIME: docker
